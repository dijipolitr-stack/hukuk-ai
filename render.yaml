services:
  # Ana API servisi
  - type: web
    name: hukuk-ai-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: cd petition_engine && uvicorn api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: APP_URL
        sync: false
      - key: PDF_DIR
        value: /tmp/pdfs
      - key: LOG_LEVEL
        value: INFO
    healthCheckPath: /health

  # Günlük scraper (cron job)
  - type: cron
    name: hukuk-ai-scraper
    runtime: python
    buildCommand: pip install -r requirements.txt
    schedule: "30 2 * * *"
    startCommand: cd scraper && python pipeline.py daily
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: PDF_DIR
        value: /tmp/pdfs
